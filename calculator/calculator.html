<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./calculator.css" />
  </head>
  <body>
    <h1>Calculator in JS</h1>

    <main>
      <div class="container">
        <div class="wrapper">
          <p id="display">0</p>

          <div class="row">
            <button id="ac-btn" class="btn btn-primary">AC</button>
            <button id="del-btn" class="btn btn-primary">DEL</button>
            <button id="percent-btn" class="btn btn-primary">%</button>
            <button id="divide-btn" class="btn btn-tertiary">/</button>
          </div>
          <div class="row">
            <button id="seven-btn" class="btn btn-secondary">7</button>
            <button id="eight-btn" class="btn btn-secondary">8</button>
            <button id="nine-btn" class="btn btn-secondary">9</button>
            <button id="multiply-btn" class="btn btn-tertiary">*</button>
          </div>
          <div class="row">
            <button id="four-btn" class="btn btn-secondary">4</button>
            <button id="five-btn" class="btn btn-secondary">5</button>
            <button id="six-btn" class="btn btn-secondary">6</button>
            <button id="minus-btn" class="btn btn-tertiary">-</button>
          </div>
          <div class="row">
            <button id="one-btn" class="btn btn-secondary">1</button>
            <button id="two-btn" class="btn btn-secondary">2</button>
            <button id="three-btn" class="btn btn-secondary">3</button>
            <button id="plus-btn" class="btn btn-tertiary">+</button>
          </div>
          <div class="row">
            <button id="zero-btn" class="btn btn-secondary">0</button>
            <button id="decimal-btn" class="btn btn-secondary">.</button>
            <button id="equal-btn" class="btn btn-tertiary">=</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./calculator.js"></script>
  </body>
</html>
